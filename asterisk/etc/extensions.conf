; ===================================================================
;  Dialplan — Call Center NODOE
;
;  Hay dos modos de routing convivientes:
;    A) ROUTING DIRECTO (default, simple, hardcoded): este archivo
;       enruta llamadas entre extensiones, hacia/desde troncales.
;    B) STASIS (a implementar): cuando el backend procese eventos
;       StasisStart, podemos quitar las reglas directas y dejar todo
;       a la app NestJS para tener IVR, colas, IA, etc.
;
;  Para HOY usamos modo A. Cuando el backend implemente Stasis routing,
;  cambiar las líneas `Dial(...)` por `Stasis(${APP},...)` en cada contexto.
; ===================================================================

[globals]
APP=callcenter-app
; OUTBOUND_TRUNK: nombre del endpoint PJSIP de la troncal saliente.
; Naming consistente: trunk_<companyId>_<id> — ej trunk_1_2 = company 1 trunk 2
; (Colombia RED Saliente). Si la troncal cambia, ajustar este valor.
OUTBOUND_TRUNK=trunk_1_2
; CallerID que se presenta al exterior cuando un agente marca afuera.
; Es el DID/CLI asignado por el proveedor.
OUTBOUND_CLI=311111118

; ===================================================================
;  PREFIJOS DE MARCACIÓN (específicos del proveedor de la troncal)
;  El agente marca el número como lo conoce (ej: 3001234567 para
;  celular, 6011234567 para fijo). El dialplan antepone el prefijo
;  exigido por el proveedor antes de enviar el INVITE.
;
;  Si cambias de operador o el actual cambia su esquema, edita estos
;  3 valores y recarga: docker exec cc-asterisk asterisk -rx "dialplan reload"
; ===================================================================
; Colombia RED actualmente exige:
;   - Celular Col (3XXXXXXXXX, 10 dig):    OUTBOUND_PREFIX_MOBILE = 06
;     → sistema envía: 06 + 57 + <número-celular>
;   - Fijo Col   (XXXXXXX o 6XX XXX XXXX): OUTBOUND_PREFIX_LANDLINE = 57
;     → sistema envía: 57 + <número-fijo>
;   - Si agente marca con prefijo país 57XX...:  OUTBOUND_PREFIX_INTL = 06
; Para *no* aplicar prefijo (proveedor que acepta el número crudo): pon vacío.
OUTBOUND_PREFIX_MOBILE=06
OUTBOUND_PREFIX_LANDLINE=57
OUTBOUND_PREFIX_INTL=06

; ===================================================================
;  ENTRANTES — llamadas que vienen desde proveedores SIP
; ===================================================================
; trunks.conf genera troncales con `context=from-trunk`. El backend
; genera extensions_dynamic.conf con la logica completa (horarios,
; festivos, IVR, colas, agentes) por cada DID configurado en BD.
; Si un DID no esta en la BD dinamica, fallback al hangup.

[from-trunk]
; #tryinclude no funciona dentro de un context. Usamos Goto al contexto
; generado dinamicamente. Si la extension no existe alli, el fallback
; "i,1" del propio Asterisk dispara → caemos a from-trunk-fallback.
exten = _X.,1,NoOp(DID entrante: ${EXTEN} — buscando en dialplan dinamico)
 same = n,Goto(from-trunk-dynamic,${EXTEN},1)
exten = i,1,Goto(from-trunk-fallback,${EXTEN},1)
exten = h,1,Hangup()

; from-trunk-fallback y from-trunk-dynamic se definen en
; extensions_dynamic.conf (generado por backend). Si ese archivo no
; existe (primera vez antes de sync), el fallback de aca abajo cuelga
; cualquier DID que no matchee.
[from-trunk-fallback]
exten = _X.,1,NoOp(DID sin routing en BD dinamica: ${EXTEN})
 same = n,Hangup()

; Cargar el dialplan dinamico generado desde BD por backend.
; Si el archivo no existe todavia (primer arranque), Asterisk lo ignora.
#tryinclude extensions_dynamic.conf

; ===================================================================
;  SALIENTES — cuando el agente marca y el dialplan from-internal procesa
;  (el dialer del backend usa outbound-bridge, ver más abajo)
; ===================================================================
[from-internal]
; --- ESPIA / SUPERVISION (ChanSpy) ---
; Marcar *XXX desde un softphone interno escucha la llamada activa de la
; extension XXX. Modo escuchar (default), pulsar # cambia a whisper, *
; cambia a barge. Solo escucha si la extension tiene una llamada en curso.
; Uso: el supervisor (que tambien debe tener una extension SIP) marca
; *001 para escuchar al agente Isabela.
exten = _*XXX,1,NoOp(Spy de ${CALLERID(num)} hacia extension ${EXTEN:1})
 same = n,Set(CHANNEL(language)=es)
 same = n,ChanSpy(PJSIP/${EXTEN:1},qE)
 same = n,Hangup()

; --- Llamadas entre extensiones internas (3 dígitos) ---
exten = _XXX,1,NoOp(Llamada interna ${CALLERID(num)} → ${EXTEN})
 same = n,Dial(PJSIP/${EXTEN},30,rtT)
 same = n,Hangup()

; --- Celular COL (10 dígitos empezando con 3) ---
exten = _3XXXXXXXXX,1,NoOp(Saliente celular ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${OUTBOUND_PREFIX_MOBILE}57${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Prefijo 57 (formato internacional COL, 12 dígitos) ---
exten = _57XXXXXXXXXX,1,NoOp(Saliente con prefijo país ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${OUTBOUND_PREFIX_INTL}${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Fijo COL (7-10 dígitos) ---
exten = _XXXXXXX,1,NoOp(Saliente fijo ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${OUTBOUND_PREFIX_LANDLINE}${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Default genérico (asume es fijo o número raro, prepende landline prefix) ---
exten = _X.,1,NoOp(Saliente genérico ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${OUTBOUND_PREFIX_LANDLINE}${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; ===================================================================
;  OUTBOUND-BRIDGE — usado por el dialer del backend (outbound-dialer
;  service), que hace ARI Originate y pasa TRUNK_NAME como variable.
; ===================================================================
[outbound]
exten = _X.,1,NoOp(Outbound to ${EXTEN} via trunk ${TRUNK_NAME})
 same = n,Set(CALLERID(num)=${CALLER_ID_NUM})
 same = n,Dial(PJSIP/${EXTEN}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

[outbound-bridge]
; Click-to-call: el agente WebRTC contesta primero, luego Asterisk
; bridgea con el destino. El backend pasa TRUNK_NAME=trunk_<companyId>_<id>.
;
; Prefijos: el backend pasa TRUNK_PREFIX_MOBILE/LANDLINE/INTL como
; variables del canal (configurados POR TRONCAL en /admin/sip-trunks).
; Si vienen vacíos, cae al global OUTBOUND_PREFIX_* de [globals]. Esto
; permite tener prefijos distintos por proveedor sin tocar este archivo.
;
; Si CALLER_ID_NUM viene vacío, usar OUTBOUND_CLI como fallback para que
; el proveedor no rechace por From inválido.
exten = _X.,1,NoOp(Agent dialing ${EXTEN} via ${TRUNK_NAME})
 same = n,ExecIf($["${CALLER_ID_NUM}" = ""]?Set(CALLERID(num)=${OUTBOUND_CLI}):Set(CALLERID(num)=${CALLER_ID_NUM}))
 ; Resolver prefijos: variable del canal (troncal) → global → vacío
 same = n,Set(PFX_MOBILE=${IF($["${TRUNK_PREFIX_MOBILE}" != ""]?${TRUNK_PREFIX_MOBILE}:${OUTBOUND_PREFIX_MOBILE})})
 same = n,Set(PFX_LANDLINE=${IF($["${TRUNK_PREFIX_LANDLINE}" != ""]?${TRUNK_PREFIX_LANDLINE}:${OUTBOUND_PREFIX_LANDLINE})})
 same = n,Set(PFX_INTL=${IF($["${TRUNK_PREFIX_INTL}" != ""]?${TRUNK_PREFIX_INTL}:${OUTBOUND_PREFIX_INTL})})
 same = n,Set(LEN_NUM=${LEN(${EXTEN})})
 same = n,Set(FIRST_CHAR=${EXTEN:0:1})
 same = n,Set(FIRST_TWO=${EXTEN:0:2})
 ; Detectar tipo y aplicar prefijo correspondiente
 same = n,GotoIf($["${FIRST_TWO}" = "57" & "${LEN_NUM}" = "12"]?intl)
 same = n,GotoIf($["${FIRST_CHAR}" = "3" & "${LEN_NUM}" = "10"]?mobile)
 same = n,Goto(landline)
 same = n(mobile),Set(DIAL_NUM=${PFX_MOBILE}57${EXTEN})
 same = n,Goto(do_dial)
 same = n(intl),Set(DIAL_NUM=${PFX_INTL}${EXTEN})
 same = n,Goto(do_dial)
 same = n(landline),Set(DIAL_NUM=${PFX_LANDLINE}${EXTEN})
 same = n,Goto(do_dial)
 same = n(do_dial),NoOp(Dialing PJSIP/${DIAL_NUM}@${TRUNK_NAME} (raw=${EXTEN} via prefixes M=${PFX_MOBILE} L=${PFX_LANDLINE} I=${PFX_INTL}))
 same = n,Dial(PJSIP/${DIAL_NUM}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

[default]
exten = _X.,1,NoOp(Default fallback - número sin routing)
 same = n,Hangup()
