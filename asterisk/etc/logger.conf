[general]
dateformat = %F %T

[logfiles]
; IMPORTANTE: NO incluir `debug` aquí — DEBUG genera ~24GB en pocas horas
; cuando hay scanners SIP atacando (intentos de toll fraud). El nivel
; `notice` es suficiente para diagnosticar problemas reales y mantiene
; el log manejable. Si necesitas DEBUG temporal: `asterisk -rx "core set debug 4"`.
console => notice,warning,error,verbose(3)
full => notice,warning,error,verbose,dtmf
queue_log => queue
