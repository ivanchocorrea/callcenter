; ===================================================================
;  PJSIP — configuración base
;  Las troncales SIP por empresa se generan dinámicamente desde el
;  backend usando el módulo res_pjsip_config_wizard o realtime.
;  Este archivo define los transports y un transporte WSS para WebRTC.
; ===================================================================

[global]
type = global
endpoint_identifier_order = ip,username,anonymous
default_realm = callcenter.local
keep_alive_interval = 30

[system]
type = system
timer_t1 = 500
timer_b = 32000
compact_headers = yes

; --- Transports -----------------------------------------------------
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060
allow_reload = yes

[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060
allow_reload = yes

[transport-tls]
type = transport
protocol = tls
bind = 0.0.0.0:5061
; cert/privkey configurables al desplegar TLS

[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:8089

; --- Plantilla común para WebRTC agents -----------------------------
[webrtc_endpoint](!)
type = endpoint
context = from-internal
disallow = all
allow = opus,ulaw,alaw
webrtc = yes
use_avpf = yes
media_encryption = dtls
dtls_verify = fingerprint
dtls_setup = actpass
ice_support = yes
media_use_received_transport = yes
rtcp_mux = yes
direct_media = no

[webrtc_aor](!)
type = aor
max_contacts = 5
remove_existing = yes

[webrtc_auth](!)
type = auth
auth_type = userpass

; ===================================================================
;  ENDPOINTS, AORS y AUTHS reales se cargan via realtime/PJSIP wizard
;  o via "pjsip reload" cuando el backend escribe en pjsip_endpoints,
;  pjsip_aors y pjsip_auths (ver ./db/migrations/*pjsip*.sql).
; ===================================================================
