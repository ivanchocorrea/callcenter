; ===================================================================
;  Asterisk HTTP server (necesario para ARI y para WSS WebRTC)
; ===================================================================
[general]
enabled = yes
bindaddr = 0.0.0.0
bindport = 8088
prefix =

; TLS para WebRTC: el navegador del agente conecta a
; wss://app.somoscallcenter.com:8089/ws para registrar su softphone.
; El archivo asterisk.pem contiene cert + key concatenados (formato PEM
; estándar). Lo genera el script scripts/setup-asterisk-tls.sh leyendo
; el cert de Let's Encrypt del dominio. NO se commitea (ver .gitignore).
tlsenable = yes
tlsbindaddr = 0.0.0.0:8089
tlscertfile = /etc/asterisk/keys/asterisk.pem
tlsprivatekey = /etc/asterisk/keys/asterisk.pem

session_limit = 200
session_inactivity = 30000
session_keep_alive = 15000
