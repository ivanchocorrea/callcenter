; ===================================================================
;  Dialplan base — entrega control a la app Stasis del backend
;  Toda la lógica de negocio (IVR, colas, enrutamiento, IA) se decide
;  en NestJS via ARI. Aquí solo enrutamos al Stasis.
; ===================================================================

[globals]
APP=callcenter-app

; --- Contexto de troncales entrantes ---
; El backend escribe variables como X-Trunk-Id y X-Did al recibir.
[from-trunk]
exten = _X.,1,NoOp(Inbound from trunk on DID ${EXTEN})
 same = n,Set(CHANNEL(language)=es)
 same = n,Set(__COMPANY_ID=${PJSIP_HEADER(read,X-Company-Id)})
 same = n,Set(__TRUNK_ID=${PJSIP_HEADER(read,X-Trunk-Id)})
 same = n,Stasis(${APP},inbound,${EXTEN},${CALLERID(num)})
 same = n,Hangup()

; --- Contexto interno (agentes WebRTC) ---
[from-internal]
exten = _X.,1,NoOp(Internal from ${CALLERID(num)} to ${EXTEN})
 same = n,Stasis(${APP},internal,${EXTEN},${CALLERID(num)})
 same = n,Hangup()

; --- Contexto outbound (originate desde backend, sin agente involucrado) ---
[outbound]
exten = _X.,1,NoOp(Outbound to ${EXTEN} via trunk ${TRUNK_NAME})
 same = n,Set(CALLERID(num)=${CALLER_ID_NUM})
 same = n,Dial(PJSIP/${EXTEN}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

; --- Contexto outbound-bridge: el agente WebRTC marca primero;
;     cuando el agente contesta, Asterisk continúa aquí y llama al destino
;     vía la troncal especificada. Ambas patas se puentean automáticamente.
[outbound-bridge]
exten = _X.,1,NoOp(Agent dialing out to ${EXTEN} via ${TRUNK_NAME})
 same = n,Set(CALLERID(num)=${CALLER_ID_NUM})
 same = n,Dial(PJSIP/${EXTEN}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

; --- Default fallback ---
[default]
exten = _X.,1,NoOp(Default fallback)
 same = n,Hangup()
