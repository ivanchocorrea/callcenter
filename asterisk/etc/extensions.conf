; ===================================================================
;  Dialplan — Call Center NODOE
;
;  Hay dos modos de routing convivientes:
;    A) ROUTING DIRECTO (default, simple, hardcoded): este archivo
;       enruta llamadas entre extensiones, hacia/desde troncales.
;    B) STASIS (a implementar): cuando el backend procese eventos
;       StasisStart, podemos quitar las reglas directas y dejar todo
;       a la app NestJS para tener IVR, colas, IA, etc.
;
;  Para HOY usamos modo A. Cuando el backend implemente Stasis routing,
;  cambiar las líneas `Dial(...)` por `Stasis(${APP},...)` en cada contexto.
; ===================================================================

[globals]
APP=callcenter-app
; ID interno de la troncal SALIENTE (Colombia RED Saliente).
; Si cambia el ID en /admin/sip-trunks, ajustar aquí. Endpoint name = trunk_<id>.
OUTBOUND_TRUNK=trunk_2
; CallerID que se presenta al exterior cuando un agente marca afuera.
; Es el número DID asignado por el proveedor para CLI (Caller Line Identification).
OUTBOUND_CLI=311111118

; ===================================================================
;  ENTRANTES — llamadas que vienen desde proveedores SIP
; ===================================================================
; trunks.conf genera para cada troncal `context=from-trunk-<id>`. Por eso
; tenemos un contexto por troncal, todos hacen Goto a `from-trunk-inbound`
; donde está la lógica común de routing por DID.

[from-trunk-1]
; Colombia RED Entrante (DID 573028209813)
exten = _X.,1,NoOp(Entrante por trunk_1 / Colombia RED Entrante / DID ${EXTEN})
 same = n,Goto(from-trunk-inbound,${EXTEN},1)

[from-trunk-2]
; Colombia RED Saliente (no debería recibir, por si acaso)
exten = _X.,1,NoOp(Entrante por trunk_2 / Colombia RED Saliente / DID ${EXTEN})
 same = n,Goto(from-trunk-inbound,${EXTEN},1)

[from-trunk-3]
; Comuniquemonos
exten = _X.,1,NoOp(Entrante por trunk_3 / Comuniquemonos / DID ${EXTEN})
 same = n,Goto(from-trunk-inbound,${EXTEN},1)

[from-trunk-inbound]
; Routing por DID. Para agregar más DIDs, copiar el patrón.
;
; DID del Hospital San Juan de Dios de Honda (Colombia RED Entrante):
;   573028209813 → ring directo a extensión 001 (Isabela), 30s timeout,
;   si no contesta, cuelga.
exten = 573028209813,1,NoOp(DID hospital → ring extensión 001 (Isabela))
 same = n,Set(CHANNEL(language)=es)
 same = n,Dial(PJSIP/001,30,rtT)
 same = n,Hangup()

; Mismo número pero sin el prefijo 57 (algunos proveedores quitan el código país):
exten = 3028209813,1,NoOp(DID hospital sin prefijo → ring extensión 001)
 same = n,Dial(PJSIP/001,30,rtT)
 same = n,Hangup()

; Default: cualquier otro DID que no tenga ruta — colgar (futuro: enviar a IVR)
exten = _X.,1,NoOp(DID sin routing definido: ${EXTEN})
 same = n,Hangup()

; ===================================================================
;  SALIENTES — agente marca desde el softphone WebRTC
; ===================================================================
[from-internal]
; --- Llamadas entre extensiones internas (3 dígitos) ---
exten = _XXX,1,NoOp(Llamada interna ${CALLERID(num)} → ${EXTEN})
 same = n,Dial(PJSIP/${EXTEN},30,rtT)
 same = n,Hangup()

; --- Llamadas a celular Colombia (10 dígitos empezando con 3) ---
exten = _3XXXXXXXXX,1,NoOp(Saliente celular ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Llamadas con prefijo 57 (formato internacional COL, 12 dígitos) ---
exten = _57XXXXXXXXXX,1,NoOp(Saliente con prefijo país ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${EXTEN:2}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Llamadas a fijos COL (7 dígitos, sin prefijo país ni indicativo ciudad) ---
exten = _XXXXXXX,1,NoOp(Saliente fijo local ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; --- Default genérico: cualquier otro número, sale por troncal saliente ---
exten = _X.,1,NoOp(Saliente genérico ${CALLERID(num)} → ${EXTEN})
 same = n,Set(CALLERID(num)=${OUTBOUND_CLI})
 same = n,Dial(PJSIP/${EXTEN}@${OUTBOUND_TRUNK},60,rtT)
 same = n,Hangup()

; ===================================================================
;  CONTEXTOS LEGACY (para que el backend Stasis siga funcionando)
; ===================================================================
[outbound]
; Originate desde backend, sin agente involucrado. ${TRUNK_NAME} debe
; venir como variable del Originate (ej: trunk_2).
exten = _X.,1,NoOp(Outbound to ${EXTEN} via trunk ${TRUNK_NAME})
 same = n,Set(CALLERID(num)=${CALLER_ID_NUM})
 same = n,Dial(PJSIP/${EXTEN}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

[outbound-bridge]
; Para click-to-call: el agente WebRTC contesta primero, luego se
; bridgea con el destino marcado.
exten = _X.,1,NoOp(Agent dialing out to ${EXTEN} via ${TRUNK_NAME})
 same = n,Set(CALLERID(num)=${CALLER_ID_NUM})
 same = n,Dial(PJSIP/${EXTEN}@${TRUNK_NAME},60,rtT)
 same = n,Hangup()

[default]
exten = _X.,1,NoOp(Default fallback - número sin routing)
 same = n,Hangup()
