# =====================================================================
#  Call Center NODOE — Stack completo
#  Servicios: backend, frontend, mysql, redis, asterisk, nginx
#
#  Para producción usar combinado con docker-compose.prod.yml:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Asterisk está bajo el profile "telephony" — solo se levanta con:
#    docker compose --profile telephony up -d
#  (cuando tengas SIP trunk configurado)
# =====================================================================

networks:
  callcenter-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  recordings-data:
  asterisk-conf:
  asterisk-sounds:
  nginx-certs:

services:

  # ---------------------------------------------------------------
  #  MySQL 8
  # ---------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: cc-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=500
      - --innodb_buffer_pool_size=1G
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------
  #  Redis 7
  # ---------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - callcenter-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  #  Asterisk 20 (deshabilitado por defecto — usar --profile telephony)
  # ---------------------------------------------------------------
  asterisk:
    image: andrius/asterisk:18-current
    container_name: cc-asterisk
    restart: unless-stopped
    network_mode: host
    profiles:
      - telephony
    volumes:
      - ./asterisk/etc:/etc/asterisk
      - asterisk-sounds:/var/lib/asterisk/sounds
      - recordings-data:/var/spool/asterisk/recording
    environment:
      ASTERISK_UID: "1000"
      ASTERISK_GID: "1000"
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show uptime"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------
  #  Backend NestJS
  # ---------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cc-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
    volumes:
      - recordings-data:/var/recordings
      # Compartido con cc-asterisk: el backend escribe `agents.conf` (PJSIP
      # endpoints de los agentes WebRTC) y Asterisk lo lee vía `#tryinclude`
      # en pjsip.conf. Sin este bind mount, el sync de agentes no surte efecto.
      - ./asterisk/etc:/etc/asterisk:rw
    networks:
      - callcenter-net
    # Necesario en Linux para que `host.docker.internal` resuelva al gateway
    # del host. El backend lo usa para alcanzar AMI/ARI cuando Asterisk corre
    # con `network_mode: host` y por tanto NO está en `callcenter-net`.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  #  Frontend Next.js
  # ---------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.somoscallcenter.com}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://app.somoscallcenter.com}
        NEXT_PUBLIC_SIP_WSS_URL: ${NEXT_PUBLIC_SIP_WSS_URL:-wss://app.somoscallcenter.com:8089/ws}
    container_name: cc-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV}
    networks:
      - callcenter-net

  # ---------------------------------------------------------------
  #  Nginx interno (deshabilitado — usamos el Nginx del sistema en el VPS)
  # ---------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: cc-nginx
    restart: unless-stopped
    profiles:
      - internal-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/letsencrypt
    networks:
      - callcenter-net
    # Necesario para que `proxy_pass http://host.docker.internal:8088/ws`
    # (WSS de Asterisk en host network) resuelva al gateway del host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
